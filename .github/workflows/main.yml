	  <guid isPermaLink="false">https://status.aws.amazon.com/#multipleservices-me-south-1_1772490547</guid>
	  <description><![CDATA[We continue to work towards restoring power in the affected Availability Zone (mes1-az2) in the ME-SOUTH-1 Region. We have no updated guidance on expected recovery times, and still expect this to take at least a day to fully restore power and connectivity. We continue to advise customers to launch replacement resources in one of the unaffected Availability Zones or an alternate AWS Region. At this time we recommend that customers that are capable of backing up data outside of the region consider doing so. You can view the current status of affected AWS services below. We will provide you with another update by 7:00 PM PST, or sooner if we have additional information to share.]]></description>
	 </item>

	 <item>
	  <title><![CDATA[Service impact: Increased Connectivity Issues and API Error Rates]]></title>
	  <link>https://status.aws.amazon.com/</link>
	  <pubDate>Mon, 02 Mar 2026 10:52:00 PST</pubDate>
	  <guid isPermaLink="false">https://status.aws.amazon.com/#multipleservices-me-south-1_1772477520</guid>
	  <description><![CDATA[We continue to work towards restoring power in the affected Availability Zone (mes1-az2) in the ME-SOUTH-1 Region. We currently expect our recovery efforts to take at least a day. Our current guidance regarding immediate recovery remains unchanged from our previous update. Customers are able to disassociate Elastic IP addresses from resources in the affected Availability Zone and associate those with resources in the unaffected Availability Zones. This can be done by specifying --allow-reassociation when attempting to associate the Elastic IP to the new resource. We will provide you with further updates by 2:00 PM PST or sooner if new information becomes available.]]></description>
	 </item>

	 <item>
	  <title><![CDATA[Service impact: Increased Connectivity Issues and API Error Rates]]></title>
	  <link>https://status.aws.amazon.com/</link>
	  <pubDate>Mon, 02 Mar 2026 06:23:19 PST</pubDate>
	  <guid isPermaLink="false">https://status.aws.amazon.com/#multipleservices-me-south-1_1772461399</guid>
	  <description><![CDATA[We continue to work toward restoring power in the impacted Availability Zone (mes1-az2) in the ME-SOUTH-1 Region. Meanwhile, EC2 instance and networking APIs have been restored for the other Availability Zones. Additionally, we have made improvements to the availability of RDS multi-AZ databases while operating with the impaired Availability Zone. These improvements will help customers create database exports to preserve data, and we recommend customers with databases in the affected Availability Zone consider creating exports as a precautionary measure. EC2 Instances, EBS Volumes, and other resources impacted in the affected Availability Zone will require a longer recovery timeline, as power has not yet been restored. We are expecting recovery to take at least a day, as it requires repair of facilities, cooling and power systems, coordination with local authorities, and careful assessment to ensure the safety of our operators. If immediate recovery is required, we recommend customers restore from EBS Snapshots and/or launch replacement resources in one of the unaffected Availability Zones or an alternate AWS Region. We will provide an update by 11:00 AM PST on March 2, or sooner if we have additional information to share.]]></description>
	 </item>

	 <item>
	  <title><![CDATA[Service impact: Increased Connectivity Issues and API Error Rates]]></title>
	  <link>https://status.aws.amazon.com/</link>
	  <pubDate>Mon, 02 Mar 2026 02:41:00 PST</pubDate>
	  <guid isPermaLink="false">https://status.aws.amazon.com/#multipleservices-me-south-1_1772448060</guid>
	  <description><![CDATA[We continue to work toward restoring power in the affected Availability Zone (mes1-az2) in the ME-SOUTH-1 Region. At this time, some AWS services have shifted traffic away from the affected Availability Zone and are seeing recovery for their affected operations and workflows. EC2 Instances, EBS Volumes, and other resources impacted in the affected Availability Zone will require a longer recovery timeline. Power has not yet been restored to the affected Availability Zone. If immediate recovery is required, we recommend customers restore from EBS Snapshots and/or launch replacement resources in one of the unaffected Availability Zones or an alternate Region. In parallel, we are actively working on reducing the error rates and latencies that some customers are experiencing with EC2 APIs. For now, we recommend continuing to retry any failed API requests. We will provide an update by 6:00 AM PST on March 2, or sooner if we have additional information to share.]]></description>
	 </item>

	 <item>
	  <title><![CDATA[Service impact: Increased Connectivity Issues and API Error Rates]]></title>
	  <link>https://status.aws.amazon.com/</link>
	  <pubDate>Mon, 02 Mar 2026 01:03:27 PST</pubDate>
	  <guid isPermaLink="false">https://status.aws.amazon.com/#multipleservices-me-south-1_1772442207</guid>
	  <description><![CDATA[We continue to work on a localized power issue affecting a single Availability Zone (mes1-az2) in the ME-SOUTH-1 Region. In the impacted Availability Zone, EC2 Instances, DB Instances, EBS Volumes, and other AWS Services are also experiencing elevated error rates and latencies for some workflows. As part of our recovery effort, we have shifted traffic away from the impacted Availability Zone for most services. We recommend customers utilize one of the other Availability Zones in the ME-SOUTH-1 Region, as existing instances in other AZs remain unaffected by this issue. We are actively working to restore power and connectivity, at which time we will begin recovering affected resources. Currently, we expect recovery to take many hours. We will provide an update by 2:30 AM PST, or sooner if we have additional information to share.]]></description>
	 </item>

	 <item>
	  <title><![CDATA[Service impact: Increased connectivity issues and API Error Rates]]></title>
	  <link>https://status.aws.amazon.com/</link>
	  <pubDate>Sun, 01 Mar 2026 23:09:03 PST</pubDate>
	  <guid isPermaLink="false">https://status.aws.amazon.com/#multipleservices-me-south-1_1772435343</guid>
	  <description><![CDATA[We are investigating connectivity and power issues affecting APIs and instances in a single Availability Zone (mes1-az2) in the ME-SOUTH-1 Region due to a localized power issue. Existing instances in this zone will also be affected. Other AWS Services may also be experiencing increased errors and latencies for their workflows, and we are working to route requests away from this affected Availability Zone. We recommend customers make use of other Availability Zones at this time. During this time, we are also experiencing delays in propagating DNS changes for Route53 to pops (Points of Presence) in ME-SOUTH-1.Â  Targeting new launches using RunInstances in the remaining AZs should succeed. Existing instances in the other AZs are not affected.]]></description>
	 </item>


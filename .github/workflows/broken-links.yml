psql "host=database-2.cluster-cpecu0qsc7ur.us-west-1.rds.amazonaws.com port=5432 dbname=postgres user=postgres sslmode=require password=$( aws rds generate-db-auth-token --hostname $RDSHOST --port 5432 --username postgres --region us-west-1 )": broken links?
'on':
  push:
    branches:
      - "**"
  schedule:
    - cron: 0 16 * * *
  workflow_dispatch:
jobs:
  linkChecker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Link Checker
        id: lc
        uses: peter-evans/link-checker@v1.2.2
        with:
          args: '-v -r *.md'
      - name: Fail?
        run: 'exit ${{ steps.lc.outputs.exit_code }}'
